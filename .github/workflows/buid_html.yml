name: Build HTML

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build-html:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install Pandoc
      run: sudo apt-get install -y pandoc

    - name: Build HTML
      run: pandoc resume.md -o resume.html

    - name: Upload HTML artifact
      uses: actions/upload-artifact@v7
      with:
        name: html
        path: resume.html
        overwrite: true
