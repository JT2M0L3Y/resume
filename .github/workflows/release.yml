name: Release

on:
  workflow_call: {}
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if current commit is already tagged
        id: check_tag
        run: |
          TAGS=$(git tag --points-at ${{ github.sha }})
          if [ -z "$TAGS" ]; then
            echo "tagged=false" >> $GITHUB_OUTPUT
          else
            echo "tagged=true" >> $GITHUB_OUTPUT
            echo "tag=$TAGS" >> $GITHUB_OUTPUT
          fi

      - name: Generate tag
        id: tagger
        if: steps.check_tag.outputs.tagged == 'false'
        uses: igorgatis/date-time-commit-release@v2
        with:
          pattern: "YYYY.MM.{{ edition | pad:3 }}"
          edition: monthly
          commit: ${{ github.sha }}

      - name: Set tag value
        id: final_tag
        run: |
          if [ "${{ steps.check_tag.outputs.tagged }}" = "true" ]; then
            echo "tag=${{ steps.check_tag.outputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ steps.tagger.outputs.tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Create Git tag if missing
        if: steps.check_tag.outputs.tagged == 'false'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{  steps.final_tag.outputs.tag }}
          git push origin ${{ steps.final_tag.outputs.tag }}

      - name: Check if release already exists for this tag
        id: check_release
        run: |
          TAG=${{ steps.final_tag.outputs.tag }}
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG)

          if [ "$STATUS" == "200" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if release already exists
        if: steps.check_release.outputs.exists == 'true'
        run: |
          echo "Release already exists for tag ${{ steps.final_tag.outputs.tag }}"
          exit 0

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.final_tag.outputs.tag }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Output final tag
        run: echo "Released version ${{ steps.final_tag.outputs.tag }}"
