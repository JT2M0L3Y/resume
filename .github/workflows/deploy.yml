name: Deploy GitHub Pages

on:
  workflow_call: {}

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Download Pages artifact
        uses: actions/download-artifact@v4
        with:
          name: pages-dist
          run-id: ${{ github.event.workflow_run.id }}

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
        with:
          path: dist
