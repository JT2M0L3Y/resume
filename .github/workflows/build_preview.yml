name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pages: write
  pull-requests: write
  id-token: write

jobs:
  build_html:
    uses: ./.github/workflows/build_html.yml

  build_pdf:
    uses: ./.github/workflows/build_pdf.yml

  preview:
    runs-on: ubuntu-latest
    needs: [build_html, build_pdf]
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download HTML artifact
        uses: actions/download-artifact@v8
        with:
          name: html
          path: preview/html

      - name: Download PDF artifact
        uses: actions/download-artifact@v8
        with:
          name: pdf
          path: preview/pdf

      - name: Copy assets
        run: |
          mkdir -p preview/assets
          cp styles.css preview/assets/
          cp resume.ts preview/assets/

      - name: Setup pages
        uses: actions/configure-pages@v5

      - name: Upload PR preview artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: preview
          retention-days: 2

      - name: Deploy PR preview with preview URL
        id: deployment
        uses: actions/deploy-pages@v4
        
      - name: Comment on PR with preview link
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          header: pr-preview
          message: |
            ### PR Preview Build Ready

            This PR has a preview build available.

            **Artifacts:**
            - HTML output
            - PDF output
            - Build assets
            
            Download the combined preview artifact:
            **pr-preview-${{ github.event.pull_request.number }}**
            
            The preview will automatically expire when the PR is closed.

